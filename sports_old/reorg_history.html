<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reorganization History</title>
    <link rel="stylesheet" href="Assests/bootstrap/css/bootstrap.min.css" />
    <style>
        body { padding: 20px; background-color: #f5f5f5; }
        
        .title-section {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px;
            color: white;
            justify-content: space-between;
        }
        
        .title-section img { width: 50px; height: 50px; margin-right: 15px; }
        .title-section h2 { margin: 0; font-size: 1.8rem; font-weight: bold; flex: 1; }
        
        .home-button { text-decoration: none; display: flex; align-items: center; }
        .home-icon { width: 30px; height: 30px; }
        
        .filter-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #dee2e6;
        }
        
        .filter-section h5 {
            color: #495057;
            margin-bottom: 15px;
            font-weight: bold;
        }
        
        .btn-primary-custom {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .btn-primary-custom:hover { background-color: #0056b3; }
        
        .table-scroll {
            max-height: 500px;
            overflow-y: auto;
            scroll-behavior: smooth;
            display: block;
            background: white;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        table thead th {
            position: sticky;
            top: 0;
            z-index: 1;
            background-color: #f8f9fa;
            font-weight: bold;
            border-bottom: 2px solid #dee2e6;
        }
        
        .export-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .export-buttons button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-export-excel {
            background-color: #28a745;
            color: white;
        }
        
        .btn-export-excel:hover { background-color: #218838; }
        
        .btn-export-pdf {
            background-color: #dc3545;
            color: white;
        }
        
        .btn-export-pdf:hover { background-color: #c82333; }
        
        .info-box {
            background-color: #e7f3ff;
            border: 1px solid #b3d9ff;
            color: #004085;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        
        .back-button {
            text-decoration: none;
            display: inline-block;
            padding: 8px 16px;
            background-color: #6c757d;
            color: white;
            border-radius: 5px;
            margin-left: 10px;
        }
        
        .back-button:hover {
            background-color: #5a6268;
            text-decoration: none;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <!-- Title Section -->
        <div class="title-section">
            <div style="display: flex; align-items: center;">
                <img src="img/ledger.png" alt="Ledger Icon">
                <div>
                    <h2>ප්‍රතිසංවිධාන ඉතිහාසය</h2>
                    <small id="clubInfo" style="color: #eee;"></small>
                </div>
            </div>
            <a href="reorg.html" class="back-button">← ඉපසට යන්න</a>
        </div>

        <!-- Info Box -->
        <div class="info-box">
            💡 <strong>තොරතුරු:</strong> ක්‍රීඩා සමාජයේ සියලු ප්‍රතිසංවිධාන ඉතිහාසය පහත දැක්වේ. Excel හෝ PDF ලෙස අපනයනය කරන්න.
        </div>

        <!-- Filter Section -->
        <div class="filter-section">
            <h5>ක්‍රීඩා සමාජයේ තොරතුරු</h5>
            <div class="row">
                <div class="col-lg-4">
                    <label class="form-label"><strong>ලියාපදිංචි අංකය (reg_id)</strong></label>
                    <input id="regIdInput" class="form-control" placeholder="Enter reg_id or auto-filled from URL">
                </div>
                <div class="col-lg-4 d-flex align-items-end">
                    <button id="loadBtn" class="btn btn-primary-custom w-100">ඉතිහාසය පූරණය කරන්න</button>
                </div>
            </div>
        </div>

        <!-- Data Table -->
        <div class="table-scroll">
            <table class="table table-hover">
                <thead class="table-light">
                    <tr>
                        <th style="width: 5%">#</th>
                        <th style="width: 20%">ප්‍රතිසංවිධාන දිනය</th>
                        <th style="width: 75%">විස්තර</th>
                    </tr>
                </thead>
                <tbody id="historyBody">
                    <tr><td colspan="3" class="text-center text-muted">දත්ත පූරණය කිරීමට බලා සිටින්න...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- Export Buttons -->
        <div class="export-buttons">
            <button id="exportExcelBtn" class="btn-export-excel" onclick="exportToExcel()">
                📊 Excel (XLSX) වෙත අපනයනය කරන්න
            </button>
            <button id="exportPdfBtn" class="btn-export-pdf" onclick="exportToPdf()">
                📄 PDF වෙත අපනයනය කරන්න
            </button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script>
        let historyData = [];
        let currentRegId = '';

        // Read reg_id from query string
        function getQueryParam(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name) || '';
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            const qreg = getQueryParam('reg_id');
            if (qreg) {
                document.getElementById('regIdInput').value = qreg;
                loadHistory(qreg);
            }
        });

        // Load button click
        document.getElementById('loadBtn').addEventListener('click', () => {
            const regId = document.getElementById('regIdInput').value.trim();
            if (!regId) {
                alert('කරුණාකර reg_id ඇතුල් කරන්න');
                return;
            }
            loadHistory(regId);
        });

        // Load history
        async function loadHistory(regId) {
            currentRegId = regId;
            const historyBody = document.getElementById('historyBody');
            const clubInfo = document.getElementById('clubInfo');

            historyBody.innerHTML = '<tr><td colspan="3" class="text-center text-muted">පූරණය කරමින් පවතී...</td></tr>';

            try {
                const res = await fetch('php/fetch_reorg_history.php?reg_id=' + encodeURIComponent(regId));
                if (!res.ok) throw new Error('Network response was not ok');
                const data = await res.json();

                if (!Array.isArray(data)) {
                    historyBody.innerHTML = '<tr><td colspan="3" class="text-center text-danger">API දෝෂයකි</td></tr>';
                    return;
                }

                historyData = data;
                clubInfo.textContent = 'ලියාපදිංචි අංකය: ' + regId;

                if (data.length === 0) {
                    historyBody.innerHTML = '<tr><td colspan="3" class="text-center text-muted">ප්‍රතිසංවිධාන ඉතිහාසය නොමැත</td></tr>';
                    return;
                }

                // Display table
                historyBody.innerHTML = '';
                data.forEach((row, idx) => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${idx + 1}</td>
                        <td><strong>${row.reorg_date || 'N/A'}</strong></td>
                        <td><small>ප්‍රතිසංවිධාන ඉතිහාසය ඇතුලත් කර ඇත</small></td>
                    `;
                    historyBody.appendChild(tr);
                });
            } catch (err) {
                console.error('Error:', err);
                historyBody.innerHTML = '<tr><td colspan="3" class="text-center text-danger">දත්ත ඉතිරි නොවිය. කරුණාකර නැවත උත්සාහ කරන්න.</td></tr>';
            }
        }

        // Export to Excel (using XLSX like view.html)
        function exportToExcel() {
            if (!currentRegId || historyData.length === 0) {
                alert('අපනයනය කිරීමට ඉතිහාසයක් නැත');
                return;
            }

            const excelData = [
                ['ලියාපදිංචි අංකය', 'ප්‍රතිසංවිධාන දිනය']
            ];

            historyData.forEach(row => {
                excelData.push([currentRegId, row.reorg_date || 'N/A']);
            });

            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(excelData);
            XLSX.utils.book_append_sheet(wb, ws, 'ප්‍රතිසංවිධාන');

            XLSX.writeFile(wb, `reorg_history_${currentRegId}.xlsx`);
        }

        // Export to PDF (using html2pdf)
        function exportToPdf() {
            if (!currentRegId || historyData.length === 0) {
                alert('අපනයනය කිරීමට ඉතිහාසයක් නැත');
                return;
            }

            const element = document.createElement('div');
            element.innerHTML = `
                <h2>ප්‍රතිසංවිධාන ඉතිහාසය</h2>
                <p><strong>ලියාපදිංචි අංකය:</strong> ${currentRegId}</p>
                <table border="1" cellpadding="10" style="width:100%; border-collapse:collapse;">
                    <thead>
                        <tr style="background-color:#f0f0f0;">
                            <th>#</th>
                            <th>ප්‍රතිසංවිධාන දිනය</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${historyData.map((row, idx) => `
                            <tr>
                                <td>${idx + 1}</td>
                                <td>${row.reorg_date || 'N/A'}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;

            const opt = {
                margin: 10,
                filename: `reorg_history_${currentRegId}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
            };

            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
